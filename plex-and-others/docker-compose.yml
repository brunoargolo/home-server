name: media
services:

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - TZ=Etc/UTC
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LOG_LEVEL=debug
      - TZ=Asia/Tashkent
      - PUID=1000
      - PGID=1000
    ports:
      - 5055:5055
    volumes:
      - ./config/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Etc/UTC
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/qbittorrent:/config
      - ${MEDIA_PATH}/Downloads:/downloads # Shared with Sonarr/Radarr
    ports:
      - 8080:8080 # Web UI
      - 20364:20364 # Torrent port
      - 20364:20364/udp
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Etc/UTC
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_PATH}/Movies:/movies #optional
      - ${MEDIA_PATH}/Downloads:/downloads #optional
    ports:
      - 7878:7878
    restart: unless-stopped
    depends_on: 
      - qbittorrent

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Etc/UTC
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_PATH}/Series:/series # Media library
      - ${MEDIA_PATH}/Downloads:/downloads # Shared with qBittorrent
    ports:
      - 8989:8989
    restart: unless-stopped
    depends_on:
      - qbittorrent
  
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config/bazarr:/config
      - ${MEDIA_PATH}/Movies:/movies
      - ${MEDIA_PATH}/Series:/tv
    ports:
      - 6767:6767
    restart: unless-stopped

  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-none}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/London
      - PUID=1000
      - PGID=1000
    ports:
      - "${PORT:-8191}:8191"
    volumes:
      - ./config/flaresolverr:/config
    restart: unless-stopped
    
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - 11011:11011
    environment:
      - TZ=Etc/UTC
      - PORT=11011
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/cleanuparr:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011"]
      interval: 1m
      timeout: 10s
      retries: 3
  
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    ports:
      - 32400:32400
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri # for hardware transcoding
    network_mode: host
    group_add:
      - 44
      - 992
    environment:
      - LIBVA_DRIVER_NAME=radeosi
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM_TOKEN}
    volumes:
      - ./config/plex:/config
      - ./config/plex/transcode:/transcode
      - ${MEDIA_PATH}:/media
